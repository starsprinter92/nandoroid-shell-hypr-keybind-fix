# ─────────────────────────────────────────────────────────────────────────────
#  Nandoroid Shell: Theme & Environment Configuration
#  This file provides the necessary environment variables for Qt/GTK apps
#  to follow the shell's dynamic colors.
# ─────────────────────────────────────────────────────────────────────────────

# --- Theme Engines ---
# Using 'kde' theme engine ensures Dolphin and other Qt apps 
# automatically follow the colors generated in ~/.config/kdeglobals
env = QT_QPA_PLATFORMTHEME,kde
env = QT_QPA_PLATFORM,wayland;xcb
env = XDG_MENU_PREFIX,plasma-

# --- Toolkit Backends ---
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# --- XDG Desktop Portal ---
# Standard Hyprland identity
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# --- Initial Theming Hook ---
# Ensure GTK applications start with the correct theme preference
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# --- Dbus Activation Sync ---
# Ensures the environment is shared correctly with portals and theme engines
exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
